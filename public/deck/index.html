<script type="application/json" id="speaker-notes">
[
  "Hi — thanks for taking the meeting. This is SNØCAP US 2 — our second deep tech fund, targeting fifty million dollars to back the engineering-first companies that will define the next century. I'll walk you through who we are, how we win deals, what Fund I is doing, and what Fund II looks like.",
  "Quick housekeeping — this is highly confidential and not for further distribution. The full disclosure supplement governs anything we discuss; nothing here is an offer to invest. Please reach out if you'd like the long-form documents.",
  "Here's our thesis in one breath. We're deep tech investors. We've put over a decade of equity into building this firm, and our job now is to be the first institutional check into the molecules, materials, and machines that compound for the next hundred years.",
  "Six results from a decade of building this firm. One — Sweet Farm, our parallel early-stage incubator, has generated seven hundred million in downstream value; university tech transfer is in our DNA. Two — thirty percent of Fund I deals came in through direct application, not warm intros, off the back of years of strategic marketing and events. Three — a congressional bid, a seat on the IC for California's first venture fund, and a real track record of leveraging policy. Four — over fifty thousand professionals in our reachable network through investor and advisor roles across communities, accelerators, and universities. Five — three GPs, four VPs, and over ten Venture Fellows; depth for diligence and succession planning. Six — we tell our companies' stories: Climate Film Festival, the Narrative Change Summit, and a shark-tank-style showcase for founders.",
  "Four representative Fund I deals — each illustrating a different way we win. SoFab creates the best viable fix — IP-protected chemistry, thirty million in POs. RevivBio fundamentally resets pricing — order of magnitude cost reduction, ten million in contracts with Bayer, Syngenta, Corteva. Sparxell generates revenue from day one — twenty-four paid pilots including LVMH, Hugo Boss, H&M. TriMagnetix solves from first principles — forty-x energy reduction with a clear path to five hundred-x.",
  "Fund Two is designed for ownership. Fund One was five million, twenty-five companies, three percent average — a discovery vehicle. Fund Two is fifty million, fifteen to twenty-five companies, ten to fifteen percent ownership target, with forty percent reserves for follow-on. Same hit rate, ten times the conviction.",
  "Here's the full Fund I portfolio — twelve companies, with vintage, check size, post-money, MOIC, and co-investors. Sixty percent of these have already marked up or are actively raising up rounds. LazeraH, our muon-catalyzed fusion bet, is currently raising and we're tracking it closely.",
  "This is the team. Shrina has overseen a billion in cumulative direct and fund investments across Republic and California State. Jonathan has twenty years building Silicon Valley companies, with exits to Zillow, Disney, and Coinbase. Nate is CTO of Quantum Leap Energy, previously the first fluid dynamicist at TerraPower and KairosPower. The star map shows our specialization grid — orange is focus area, gray is supporting depth.",
  "The ecosystem we plug into. Venture partners at Harvard Business School and Wharton. Fellows at Yale, Michigan, UBC, Skidmore. Faculty and tech-transfer relationships at Cornell, RIT, UC Davis, Penn State, UC Riverside. And a co-investor and pilot network that includes Schneider Electric, L'Oréal, Cambridge Enterprise, Anglo American, Newlab, BioGenerator, HAX, and Future Communities Capital.",
  "Three categories where the breakthroughs are happening — Molecules, Materials, Machines. Catalysis, enzymes, polymers, photonics, magnetics, low-energy compute. We pattern-match across the graph because the underlying science rhymes — a coatings insight from one company unlocks diligence on three others.",
  "Case study one — SoFab. Discovery: industry signal pointed to perovskites; SoFab was the only company addressing the bottleneck. Analysis: chemistry adaptable to catalysts and sensors. Conviction: customer validation from leading developers, LOIs and MOUs from global manufacturers. Negotiation: we invested at a six million post-money with a board observer seat. Syndication: we shaped the seed-round narrative.",
  "Case study two — TriMagnetix. Referred by Actuate Ventures; they were initially pitching space tech. We saw the chip play instead — energy savings and radiation-resistance applications. We brought the valuation from ten million plus down to one and a half million by addressing cost drivers, then helped them syndicate operating capital for lab work.",
  "Case study three — Sparxell. Sent to us when peer investors couldn't value the company. Our analysis showed applicability across cosmetics, textiles, automotive, industrial coatings. Founder Ben demonstrated talent attraction, off-the-shelf manufacturing, and Cambridge IP. We secured a board observer seat alongside L'Oréal and brought in Future Communities Capital for the round.",
  "Key terms at a glance. Fifty million target with a seventy-five million cap. Fifteen to twenty-five investments. Two-fifty K to one million check size. Ten to fifteen percent ownership. Forty percent reserves. Two and twenty. One percent GP commit. Five-hundred-K LP minimum subject to GP discretion. Five-year investment period, ten-year fund term. Perkins Coie LLP is fund counsel.",
  "Thank you. We'd love to talk further. Reach us at gps@snocap.vc — and we'll send through the full disclosure supplement, the data room link, and references from existing LPs."
]
</script>
