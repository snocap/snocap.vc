name: Deploy Deck Gate Worker
on:
  push:
    branches: [main]
    paths: ["workers/deck-gate/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/deck-gate
          command: deploy
